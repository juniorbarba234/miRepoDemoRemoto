<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYS_AUTH | Portal</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #fff;
            text-shadow: 2px 2px 0px #ff00ff, -2px -2px 0px #00ffcc;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: rgba(10, 10, 15, 0.85);
            padding: 30px;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, #00ffcc, #ff00ff);
            border-radius: 8px 8px 0 0;
        }
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px dashed #444;
            padding-bottom: 15px;
        }
        .toggle-label {
            font-size: 14px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .active-label { color: #00ffcc; text-shadow: 0 0 8px rgba(0, 255, 204, 0.5); }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            transition: .4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px; width: 22px;
            left: 3px; bottom: 3px;
            background-color: #00ffcc;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: rgba(255, 0, 255, 0.2);
            border-color: #ff00ff;
        }
        input:checked + .slider:before {
            transform: translateX(30px);
            background-color: #ff00ff;
        }
        form { display: none; flex-direction: column; gap: 15px; }
        .active-form { display: flex; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: #fff;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            transition: all 0.3s;
            margin-top: 10px;
        }
        #loginForm button { color: #00ffcc; border-color: #00ffcc; }
        #loginForm button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        
        #signupForm button { color: #ff00ff; border-color: #ff00ff; }
        #signupForm button:hover { background: #ff00ff; color: #000; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <h1>TERMINAL CENTRAL</h1>

    <div class="container">
        <div class="toggle-container">
            <span class="toggle-label active-label" id="lblLogin">Login</span>
            <label class="switch">
                <input type="checkbox" id="toggleAuth">
                <span class="slider"></span>
            </label>
            <span class="toggle-label" id="lblSignup">Sign Up</span>
        </div>

        <form id="loginForm" action="/login" method="POST" class="active-form">
            <input type="email" name="email" placeholder="> USUARIO_ID" required>
            <input type="password" name="password" placeholder="> CLAVE_ACCESO" required>
            <button type="submit">INICIAR SESIÓN</button>
        </form>

        <form id="signupForm" action="/signup" method="POST">
            <input type="email" name="email" placeholder="> NUEVO_CORREO" required>
            <input type="password" name="password" placeholder="> NUEVA_CLAVE" required>
            <button type="submit">REGISTRAR</button>
        </form>
    </div>

    <script>
        const toggleAuth = document.getElementById("toggleAuth");
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");
        const lblLogin = document.getElementById("lblLogin");
        const lblSignup = document.getElementById("lblSignup");

        toggleAuth.addEventListener("change", () => {
            if (toggleAuth.checked) {
                loginForm.classList.remove("active-form");
                signupForm.classList.add("active-form");
                lblLogin.classList.remove("active-label");
                lblSignup.classList.add("active-label");
            } else {
                signupForm.classList.remove("active-form");
                loginForm.classList.add("active-form");
                lblSignup.classList.remove("active-label");
                lblLogin.classList.add("active-label");
            }
        });
    </script>
    
</body>
</html>
